<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapMe PH</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">Snap<span>Me</span></div>
      <div class="auth-tagline">shot on phone. felt in frame. 📷</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="auth-tab-login" onclick="showLogin()">Sign In</button>
        <button class="auth-tab" id="auth-tab-signup" onclick="showSignup()">Sign Up</button>
      </div>
      <div class="auth-form">
        <input id="email" type="email" placeholder="Email address">
        <input id="password" type="password" placeholder="Password">
        <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Sign In</button>
      </div>
    </div>
  </div>

  <div id="setup-screen">
    <div class="auth-box">
      <div class="auth-logo">Snap<span>Me</span></div>
      <p style="margin-bottom: 20px; color: var(--text-dim);">Complete your profile to continue</p>
      <div class="auth-form">
        <input id="setup-username" type="text" placeholder="Username">
        <textarea id="setup-bio" placeholder="Tell us about your style..." rows="3"></textarea>
        <button class="btn-primary" onclick="saveProfile()">Start Snapping</button>
      </div>
    </div>
  </div>

  <div id="app-container">
    <header class="header">
      <div class="logo-small">Snap<span>Me</span></div>
      <div class="post-avatar" id="nav-avatar-display" style="cursor: pointer;">?</div>
    </header>

    <main>
      <section id="homePage" class="page">
        <div class="feed-container" id="feedContainer"></div>
      </section>

      <section id="profilePage" class="page">
        <div class="profile-header">
          <div class="profile-main-avatar" id="profile-init">?</div>
          <h2 class="profile-name" id="profile-user">Username</h2>
          <p class="profile-bio" id="profile-bio-text">No bio yet.</p>
          <div class="profile-stats-row">
            <div class="p-stat"><span class="p-stat-val" id="stat-posts">0</span><span class="p-stat-lbl">Posts</span></div>
            <div class="p-stat"><span class="p-stat-val" id="stat-likes">0</span><span class="p-stat-lbl">Likes</span></div>
          </div>
          <button class="btn-primary" onclick="handleSignOut()" style="padding: 8px 20px; font-size: 0.8rem; margin-top: 15px;">Sign Out</button>
        </div>
        <div class="profile-grid" id="profileGrid"></div>
      </section>
    </main>

    <nav class="nav-bar">
      <div class="nav-tab active" onclick="showPage('home', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        <span class="nav-tab-label">Home</span>
      </div>
      <div class="nav-tab">
        <div class="upload-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
        <span class="nav-tab-label">Upload</span>
      </div>
      <div class="nav-tab" onclick="showPage('profile', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span class="nav-tab-label">Profile</span>
      </div>
    </nav>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js" type="module"></script>
</body>
</html>
